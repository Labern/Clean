<html lang="en">
<head>

<style>
  :root {

    --g: #8ac926; --b: #1982c4; --i: #6a4c93; --v: #b15ee3;
    --gold: #ffec99;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  /* body must be free to grow with content — a fixed height leaves white
     canvas below the fold (the gradient only paints the body box) */

  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 5vh 5vw 12vh;
    color: #222;
    background: linear-gradient(
      180deg,
      var(--r) 0%, var(--o) 16%, var(--y) 33%, var(--g) 50%,
      var(--b) 67%, var(--i) 84%, var(--v) 100%
    );
    background-attachment: fixed;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(2.2rem, 8vw, 5rem);
    line-height: 1.1;
    color: #fff;
    font-weight: 900;
    text-shadow: 3px 3px 0 #6a4c93, -2px -2px 0 #ff595e, 0 0 18px rgba(0,0,0,0.25);
    margin-bottom: 0.4rem;
  }

  .tagline {
    color: #fff;
    font-weight: 900;
    font-size: clamp(1rem, 4vw, 1.5rem);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    margin-bottom: 0.7rem;
  }

  .stats {
    color: #fff;
    font-weight: 900;
    font-size: clamp(0.85rem, 3.4vw, 1.15rem);
    background: rgba(0,0,0,0.22);
    border-radius: 999px;
    padding: 0.45em 1.2em;
    margin-bottom: clamp(1rem, 4vw, 1.6rem);
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .stats b { color: var(--gold); }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 860px;
    gap: clamp(1rem, 4vw, 1.6rem);
  }

  /* ---- flavour selector ---- */
  .flavours {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(0.4rem, 2vw, 0.7rem);
  }
  .chip {
    font-family: inherit;
    font-weight: 900;
    font-size: clamp(0.85rem, 3.4vw, 1.1rem);
    color: #6a4c93;
    background: rgba(255,253,245,0.82);
    border: 3px solid #fff;
    border-radius: 999px;
    padding: 0.45em 1em;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    transition: transform 0.12s ease, background 0.15s ease, color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:hover { transform: translateY(-2px); }
  .chip.on {
    background: #6a4c93;
    color: #fff;
    border-color: var(--gold);
    box-shadow: 0 5px 0 rgba(0,0,0,0.25), 0 0 16px rgba(255,236,153,0.55);
  }

  .chip.small {
    font-size: clamp(0.75rem, 3vw, 0.95rem);
    padding: 0.4em 0.9em;
    opacity: 0.9;
  }

  /* ---- Speech bubble (the quote) ---- */
  .bubble {
    position: relative;
    background: rgba(255,255,255,0.97);
    border: 5px solid #000000;
    border-radius: 30px;
    padding: clamp(1.3rem, 4.5vw, 2rem);
    width: 100%;
    max-width: 640px;
    margin-bottom: clamp(1.8rem, 6vw, 2.6rem);
    box-shadow: 0 16px 36px rgba(0,0,0,0.28);
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.7rem;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -26px; left: 50%;
    transform: translateX(-50%);
    border-left: 24px solid transparent;
    border-right: 24px solid transparent;
    border-top: 28px solid #000000;
  }
  .bubble::before {
    content: "";
    position: absolute;
    bottom: -17px; left: 50%;
    transform: translateX(-50%);
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 20px solid rgba(255,255,255,0.97);
    z-index: 1;
  }

  .quote-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .quote-wrap.fade { opacity: 0; transform: scale(0.96); }

  .msg {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    max-width: 100%;
  }
  .msg .avatar {
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    line-height: 1;
    flex: 0 0 auto;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
  }
  .msg .txt {
    text-align: left;
    font-weight: 800;
    font-size: clamp(1rem, 3.9vw, 1.35rem);
    line-height: 1.3;
    padding: 0.55em 0.85em;
    border-radius: 18px;
    border: 3px solid #000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    word-break: break-word;
  }
  .msg.lemon .txt {
    background: #fff3b0;
    color: #5a4a00;
    border-bottom-left-radius: 4px;
  }
  .msg.girl {
    flex-direction: row-reverse;
    align-self: flex-end;
  }
  .msg.girl .txt {
    background: #e8d7ff;
    color: #3d2a63;
    border-bottom-right-radius: 4px;
    text-align: right;
  }

  .who-legend {
    font-weight: 900;
    font-size: clamp(0.75rem, 2.8vw, 0.95rem);
    color: #5a3d86;
    opacity: 0.8;
  }
  .when {
    font-weight: 900;
    font-size: clamp(0.8rem, 3vw, 1rem);
    color: #1982c4;
  }
  .cat-tag {
    position: absolute;
    top: -16px; right: 18px;
    background: var(--gold);
    color: #6a4c93;
    border: 3px solid #000;
    border-radius: 999px;
    font-weight: 900;
    font-size: clamp(0.7rem, 2.8vw, 0.9rem);
    padding: 0.2em 0.8em;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transform: rotate(3deg);
  }

  /* Sol the lemon */
  .sol {
    width: clamp(120px, 30vw, 190px);
    height: auto;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-12px) rotate(1deg); }
  }

  /* ---- buttons ---- */
  .open-btn {
    font-family: inherit;
    display: inline-block;
    text-decoration: none;
    font-weight: 900;
    font-size: clamp(1.1rem, 4.5vw, 1.6rem);
    color: #6a4c93;
    background: #fffdf5;
    border: 4px solid #fff;
    border-radius: 999px;
    padding: 0.7em 1.4em;
    cursor: pointer;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18), 0 12px 24px rgba(0,0,0,0.22);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .open-btn:hover { transform: translateY(-2px); }
  .open-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.18), 0 6px 12px rgba(0,0,0,0.22);
  }

  /* a word she spelled her own way — it sparkles, subtly */
  .sp {
    font-style: normal;
    position: relative;
    background: linear-gradient(90deg, #b8860b, #e6b400, #b8860b);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 2.6s linear infinite;
  }
  .sp::after {
    content: "✨";
    font-size: 0.55em;
    position: absolute;
    top: -0.5em; right: -0.7em;
    -webkit-text-fill-color: initial;
    opacity: 0.75;
    animation: twinkle 2.6s ease-in-out infinite;
  }
  @keyframes shimmer {
    to { background-position: -200% 0; }
  }

  /* ---- Floating sparkles + lemons ---- */
  .spark {
    position: fixed;
    font-size: clamp(0.9rem, 3vw, 1.4rem);
    pointer-events: none;
    animation: twinkle 4s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: translateY(0) scale(0.9); }
    50%      { opacity: 0.9;  transform: translateY(-14px) scale(1.15); }
  }
</style>

  const CAT_META = {
    funny:    { tag: '😂 funny' },
    insane:   { tag: '🌀 insane' },
    romantic: { tag: '💛 romantic' },
    unhinged: { tag: '🔥 unhinged' }
  };

  const wrapEl = document.getElementById('quoteWrap');
  const whenEl = document.getElementById('when');
  const catEl = document.getElementById('catTag');
  const newBtn = document.getElementById('newBtn');
  const flavoursEl = document.getElementById('flavours');
  const tagFiltersEl = document.getElementById('tagFilters');

  let cat = 'all';
  let tagFilter = 'all';
  let bag = [];
  let timer = null;

  const pool = () => QUOTES
    .filter(q => cat === 'all' || q.cat === cat)
    .filter(q => tagFilter === 'all' || (q.tags && q.tags.includes(tagFilter)));

  function refill() {
    bag = pool().slice();
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }

  function render(q) {
    wrapEl.innerHTML = '';
    q.msgs.forEach(m => {
      const row = document.createElement('div');
      row.className = 'msg ' + m.who;
      const av = document.createElement('span');
      av.className = 'avatar';
      av.textContent = m.who === 'lemon' ? '🍋' : '🌙';
      const tx = document.createElement('span');
      tx.className = 'txt';
      if (m.hl) tx.innerHTML = m.hl;   // pre-escaped at build time, typos wrapped in <em class="sp">
      else tx.textContent = m.text;
      row.appendChild(av);
      row.appendChild(tx);
      wrapEl.appendChild(row);
    });
    whenEl.textContent = q.when + ' 🍋';
    catEl.textContent = CAT_META[q.cat] ? CAT_META[q.cat].tag : '🍋';
  }

  function next() {
    if (!bag.length) refill();
    if (!bag.length) return;
    const q = bag.pop();
    wrapEl.classList.add('fade');
    setTimeout(() => {
      render(q);
      wrapEl.classList.remove('fade');
    }, 350);
    restartTimer();
  }

  function restartTimer() {
    if (timer) clearInterval(timer);
    timer = setInterval(next, 20000);
  }

  newBtn.addEventListener('click', next);

  flavoursEl.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    cat = chip.dataset.cat;
    flavoursEl.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c === chip));
    refill();
    next();
  });

  tagFiltersEl.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    tagFilter = chip.dataset.tag;
    tagFiltersEl.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c === chip));
    refill();
    next();
  });

  // gentle fixed sparkles + lemons around the page
  const SPOTS = [[6,18],[90,12],[12,68],[86,74],[48,6],[70,40],[26,38],[60,86],[8,45],[92,50]];
  SPOTS.forEach(([x, y], i) => {
    const sp = document.createElement('span');
    sp.className = 'spark';
    sp.textContent = i % 3 === 0 ? '🍋' : (i % 3 === 1 ? '✨' : '⭐');
    sp.style.left = x + 'vw';
    sp.style.top = y + 'vh';
    sp.style.animationDelay = (i * 0.6) + 's';
    document.body.appendChild(sp);
  });

  refill();
  next();
</script>
