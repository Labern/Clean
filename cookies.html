<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Fortune Cookies for Sol</title>
<style>
  :root {
    --r: #ff595e; --o: #ff924c; --y: #ffca3a;
    --g: #8ac926; --b: #1982c4; --i: #6a4c93; --v: #b15ee3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 5vh 5vw 6vh;
    color: #222;
    background: linear-gradient(
      180deg,
      var(--r) 0%, var(--o) 16%, var(--y) 33%, var(--g) 50%,
      var(--b) 67%, var(--i) 84%, var(--v) 100%
    );
    background-attachment: fixed;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(2.2rem, 8vw, 5rem);
    line-height: 1.1;
    color: #fff;
    font-weight: 900;
    text-shadow: 3px 3px 0 #6a4c93, -2px -2px 0 #ff595e, 0 0 18px rgba(0,0,0,0.25);
    margin-bottom: 0.6rem;
    max-width: 14ch;
  }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 820px;
    gap: clamp(0.9rem, 3.5vw, 1.6rem);
  }

  /* ---- Cookie + the speech bubble that pops out of it ---- */
  .cookie-area {
    position: relative;
    width: min(92vw, 360px);
    height: clamp(300px, 50vh, 390px);
  }

  /* Original speech bubble — pops up out of the cookie */
  .bubble {
    position: absolute;
    left: 50%;
    bottom: 60px;
    width: min(84vw, 340px);
    transform: translateX(-50%) translateY(30px) scale(0.25);
    transform-origin: bottom center;
    opacity: 0;
    background: rgba(255,255,255,0.97);
    border: 5px solid #2a2a2a;
    border-radius: 30px;
    padding: clamp(1.1rem, 4.5vw, 1.7rem);
    box-shadow: 0 16px 36px rgba(0,0,0,0.28);
    transition: transform 0.7s cubic-bezier(.2,.9,.25,1.2), opacity 0.5s ease;
    z-index: 1;
  }
  .stage.open .bubble {
    transform: translateX(-50%) translateY(-145px) scale(1);
    opacity: 1;
  }
  /* speech-bubble tail pointing down toward the cookie */
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -26px; left: 50%;
    transform: translateX(-50%);
    border-left: 24px solid transparent;
    border-right: 24px solid transparent;
    border-top: 28px solid #2a2a2a;
  }
  .bubble::before {
    content: "";
    position: absolute;
    bottom: -17px; left: 50%;
    transform: translateX(-50%);
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 20px solid rgba(255,255,255,0.97);
    z-index: 1;
  }
  .fortune {
    font-size: clamp(1.2rem, 5vw, 2rem);
    line-height: 1.3;
    font-weight: 700;
    color: #1a1a1a;
  }
  .attrib {
    margin-top: 0.7rem;
    font-size: clamp(0.85rem, 3vw, 1.15rem);
    font-weight: 700;
    color: #6a4c93;
    letter-spacing: 0.3px;
    min-height: 1.2em;
  }

  .cookie {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 150px;
    z-index: 2;
    filter: drop-shadow(0 12px 14px rgba(0,0,0,0.30));
  }
  .stage.cracking .cookie { animation: shake 0.45s ease-in-out; }

  .half {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background:
      radial-gradient(120% 90% at 50% 18%, #ffe08a 0%, #f6c453 38%, #e09f3e 70%, #c77f2e 100%);
    transition: transform 0.7s cubic-bezier(.34,1.3,.6,1);
    box-shadow: inset 0 -10px 18px rgba(150,90,20,0.45);
  }
  .half.left {
    left: 0;
    border-radius: 130px 16px 16px 130px / 80px 12px 12px 80px;
    border-right: 3px solid rgba(150,90,20,0.5);
    transform-origin: right center;
  }
  .half.right {
    left: 50%;
    border-radius: 16px 130px 130px 16px / 12px 80px 80px 12px;
    border-left: 3px solid rgba(150,90,20,0.5);
    transform-origin: left center;
  }
  .half::after {
    content: "";
    position: absolute;
    top: 12%;
    height: 76%;
    width: 14px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    border-radius: 50%;
  }
  .half.left::after  { right: 6px; }
  .half.right::after { left: 6px; }

  .stage.open .half.left  { transform: translateX(-78px) rotate(-26deg); }
  .stage.open .half.right { transform: translateX(78px)  rotate(26deg); }

  @keyframes shake {
    0%,100% { transform: translateX(-50%) rotate(0); }
    20% { transform: translateX(-53%) rotate(-3deg); }
    40% { transform: translateX(-47%) rotate(3deg); }
    60% { transform: translateX(-52%) rotate(-2deg); }
    80% { transform: translateX(-48%) rotate(2deg); }
  }

  /* Sol the lemon */
  .sol {
    width: clamp(150px, 42vw, 250px);
    height: auto;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-12px) rotate(1deg); }
  }

  /* Open button */
  .open-btn {
    font-family: inherit;
    font-weight: 900;
    font-size: clamp(1.1rem, 4.5vw, 1.6rem);
    color: #6a4c93;
    background: #fffdf5;
    border: 4px solid #fff;
    border-radius: 999px;
    padding: 0.7em 1.4em;
    cursor: pointer;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18), 0 12px 24px rgba(0,0,0,0.22);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .open-btn:hover { transform: translateY(-2px); }
  .open-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.18), 0 6px 12px rgba(0,0,0,0.22);
  }

  /* ---- Flavour picker ---- */
  .picker {
    width: 100%;
    max-width: 700px;
    margin-top: clamp(0.6rem, 3vw, 1.2rem);
  }
  .picker h2 {
    color: #fff;
    font-size: clamp(1rem, 4vw, 1.5rem);
    font-weight: 900;
    margin-bottom: 1rem;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  }
  .flavors {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
    gap: clamp(0.5rem, 2.5vw, 0.9rem);
  }
  .flavor {
    font-family: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 0.3rem;
    width: clamp(88px, 27vw, 112px);
    padding: 0.7rem 0.4rem;
    background: rgba(255,255,255,0.55);
    border: 3px solid rgba(255,255,255,0);
    border-radius: 18px;
    cursor: pointer;
    opacity: 0.6;
    filter: grayscale(0.5);
    transition: opacity .18s ease, filter .18s ease, background .18s ease,
                border-color .18s ease, transform .18s ease, box-shadow .18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .flavor .ico { font-size: clamp(1.6rem, 7vw, 2.2rem); line-height: 1; }
  .flavor .name {
    font-size: clamp(0.72rem, 2.7vw, 0.92rem);
    font-weight: 800;
    color: #5a3d86;
    line-height: 1.15;
  }
  .flavor:hover { opacity: 0.85; }
  .flavor.on {
    opacity: 1;
    filter: none;
    background: #fffdf5;
    border-color: #fff;
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  }

  /* ---- Countdown at the very bottom ---- */
  .countdown {
    margin-top: clamp(1.6rem, 5vw, 2.6rem);
    color: #fff;
    font-weight: 900;
    font-size: clamp(1rem, 4vw, 1.45rem);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.28);
  }
  .countdown b {
    display: inline-block;
    min-width: 1.3em;
    color: #ffec99;
  }
</style>
</head>
<body>
  <h1>Digital Fortune Cookies for Sol</h1>

  <div class="stage" id="stage">
    <div class="cookie-area">
      <div class="bubble">
        <div class="fortune" id="fortune">&hellip;</div>
        <div class="attrib" id="attrib"></div>
      </div>
      <div class="cookie" aria-hidden="true">
        <div class="half left"></div>
        <div class="half right"></div>
      </div>
    </div>

    <img class="sol" src="sol-lemon.png" alt="Sol the lemon" />

    <button class="open-btn" id="openBtn" type="button">🥠 Open new cookie</button>

    <div class="picker">
      <h2>Pick your fortune flavours 🥠</h2>
      <div class="flavors" id="flavors"></div>
    </div>

    <div class="countdown">New fortune cookie delivery in <b id="count">10</b></div>
  </div>

<script>
  const SOURCES = {
    marcus: { label: "Marcus Aurelius", quotes: [
      { text: "You have power over your mind — not outside events. Realize this, and you will find strength.", by: "Marcus Aurelius, Meditations" },
      { text: "The happiness of your life depends upon the quality of your thoughts.", by: "Marcus Aurelius, Meditations" },
      { text: "Waste no more time arguing about what a good man should be. Be one.", by: "Marcus Aurelius, Meditations" },
      { text: "The soul becomes dyed with the color of its thoughts.", by: "Marcus Aurelius, Meditations" },
      { text: "Confine yourself to the present.", by: "Marcus Aurelius, Meditations" },
      { text: "The best revenge is to be unlike him who performed the injury.", by: "Marcus Aurelius, Meditations" },
      { text: "Dwell on the beauty of life. Watch the stars, and see yourself running with them.", by: "Marcus Aurelius, Meditations" }
    ]},
    tao: { label: "Taoism", quotes: [
      { text: "The journey of a thousand miles begins with a single step.", by: "Lao Tzu, Tao Te Ching" },
      { text: "Nature does not hurry, yet everything is accomplished.", by: "Lao Tzu" },
      { text: "When I let go of what I am, I become what I might be.", by: "Lao Tzu" },
      { text: "Knowing others is wisdom; knowing yourself is enlightenment.", by: "Lao Tzu, Tao Te Ching" },
      { text: "He who knows that enough is enough will always have enough.", by: "Lao Tzu" },
      { text: "Water is the softest thing, yet it can penetrate mountains and earth.", by: "Lao Tzu" }
    ]},
    buddha: { label: "Buddhism", quotes: [
      { text: "Peace comes from within. Do not seek it without.", by: "Buddha" },
      { text: "What we think, we become.", by: "Buddha, Dhammapada" },
      { text: "Holding on to anger is like grasping a hot coal with the intent of harming another; you are the one who gets burned.", by: "Buddha" },
      { text: "Three things cannot be long hidden: the sun, the moon, and the truth.", by: "Buddha" },
      { text: "No one saves us but ourselves. We ourselves must walk the path.", by: "Buddha, Dhammapada" },
      { text: "Do not dwell in the past, do not dream of the future, concentrate the mind on the present moment.", by: "Buddha" }
    ]},
    zen: { label: "Zen", quotes: [
      { text: "Before enlightenment, chop wood, carry water. After enlightenment, chop wood, carry water.", by: "Zen proverb" },
      { text: "When you reach the top of the mountain, keep climbing.", by: "Zen proverb" },
      { text: "Let go, or be dragged.", by: "Zen proverb" },
      { text: "Sitting quietly, doing nothing, spring comes, and the grass grows by itself.", by: "Zen proverb" },
      { text: "The obstacle is the path.", by: "Zen proverb" },
      { text: "When walking, walk. When eating, eat.", by: "Zen proverb" }
    ]},
    confucius: { label: "Confucius", quotes: [
      { text: "It does not matter how slowly you go as long as you do not stop.", by: "Confucius" },
      { text: "The man who moves a mountain begins by carrying away small stones.", by: "Confucius" },
      { text: "Wherever you go, go with all your heart.", by: "Confucius" },
      { text: "Our greatest glory is not in never falling, but in rising every time we fall.", by: "Confucius" },
      { text: "Real knowledge is to know the extent of one's ignorance.", by: "Confucius, Analects" },
      { text: "Choose a job you love, and you will never have to work a day in your life.", by: "Confucius" }
    ]},
    seneca: { label: "Seneca", quotes: [
      { text: "We suffer more often in imagination than in reality.", by: "Seneca, Letters" },
      { text: "It is not that we have a short time to live, but that we waste a lot of it.", by: "Seneca, On the Shortness of Life" },
      { text: "Every new beginning comes from some other beginning's end.", by: "Seneca" },
      { text: "Difficulties strengthen the mind, as labor does the body.", by: "Seneca" },
      { text: "Luck is what happens when preparation meets opportunity.", by: "Seneca" },
      { text: "He who is brave is free.", by: "Seneca" }
    ]},
    rumi: { label: "Rumi", quotes: [
      { text: "The wound is the place where the light enters you.", by: "Rumi" },
      { text: "What you seek is seeking you.", by: "Rumi" },
      { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", by: "Rumi" },
      { text: "Let yourself be silently drawn by the strange pull of what you really love.", by: "Rumi" },
      { text: "Raise your words, not your voice. It is rain that grows flowers, not thunder.", by: "Rumi" },
      { text: "You are not a drop in the ocean. You are the entire ocean in a drop.", by: "Rumi" }
    ]},
    greek: { label: "Ancient Greece", quotes: [
      { text: "The only true wisdom is in knowing you know nothing.", by: "Socrates" },
      { text: "The unexamined life is not worth living.", by: "Socrates" },
      { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", by: "Aristotle" },
      { text: "Knowing yourself is the beginning of all wisdom.", by: "Aristotle" },
      { text: "No man ever steps in the same river twice.", by: "Heraclitus" },
      { text: "Happiness depends upon ourselves.", by: "Aristotle" }
    ]},
    proverbs: { label: "World Proverbs", quotes: [
      { text: "Fall seven times, stand up eight.", by: "Japanese proverb" },
      { text: "A smooth sea never made a skilled sailor.", by: "Proverb" },
      { text: "When the winds of change blow, some build walls and others build windmills.", by: "Chinese proverb" },
      { text: "The best time to plant a tree was twenty years ago. The second best time is now.", by: "Chinese proverb" },
      { text: "A bird does not sing because it has an answer; it sings because it has a song.", by: "Chinese proverb" },
      { text: "Dig the well before you are thirsty.", by: "Chinese proverb" }
    ]},
    gibran: { label: "Kahlil Gibran", quotes: [
      { text: "Out of suffering have emerged the strongest souls; the most massive characters are seared with scars.", by: "Kahlil Gibran" },
      { text: "The deeper that sorrow carves into your being, the more joy you can contain.", by: "Kahlil Gibran, The Prophet" },
      { text: "Work is love made visible.", by: "Kahlil Gibran, The Prophet" },
      { text: "Yesterday is but today's memory, and tomorrow is today's dream.", by: "Kahlil Gibran, The Prophet" },
      { text: "Your daily life is your temple and your religion.", by: "Kahlil Gibran, The Prophet" },
      { text: "Trust the magician in you.", by: "Kahlil Gibran" }
    ]}
  };

  const stage = document.getElementById('stage');
  const fortuneEl = document.getElementById('fortune');
  const attribEl = document.getElementById('attrib');
  const btn = document.getElementById('openBtn');
  const flavorsEl = document.getElementById('flavors');
  const countEl = document.getElementById('count');

  const selected = new Set(['marcus', 'tao']);
  let queue = [];
  const PERIOD = 10;        // seconds between deliveries
  let countdown = PERIOD;

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function rebuildQueue() {
    const pool = [];
    selected.forEach(key => SOURCES[key].quotes.forEach(q => pool.push(q)));
    queue = shuffle(pool);
  }

  function nextQuote() {
    if (selected.size === 0) return null;
    if (queue.length === 0) rebuildQueue();
    return queue.pop();
  }

  function openNewCookie() {
    stage.classList.remove('open');           // rejoin current cookie
    setTimeout(() => {
      const q = nextQuote();
      if (!q) {
        fortuneEl.innerHTML = 'Pick a flavour below to get a fortune!';
        attribEl.textContent = '';
      } else {
        fortuneEl.innerHTML = '&ldquo;' + q.text + '&rdquo;';
        attribEl.textContent = '— ' + q.by;
      }
      stage.classList.add('cracking');
      setTimeout(() => {
        stage.classList.remove('cracking');
        stage.classList.add('open');
      }, 450);
    }, 450);
  }

  function resetCountdown() {
    countdown = PERIOD;
    countEl.textContent = countdown;
  }

  // Single 1s ticker drives both the countdown display and the delivery.
  setInterval(() => {
    countdown -= 1;
    if (countdown <= 0) {
      openNewCookie();
      countdown = PERIOD;
    }
    countEl.textContent = countdown;
  }, 1000);

  // Build the flavour toggles (fortune-cookie icons)
  Object.keys(SOURCES).forEach(key => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'flavor' + (selected.has(key) ? ' on' : '');
    b.innerHTML = '<span class="ico">🥠</span><span class="name">' + SOURCES[key].label + '</span>';
    b.addEventListener('click', () => {
      if (selected.has(key)) selected.delete(key);
      else selected.add(key);
      b.classList.toggle('on');
      queue = []; // next cookie draws from the new selection
    });
    flavorsEl.appendChild(b);
  });

  btn.addEventListener('click', () => { openNewCookie(); resetCountdown(); });

  // First cookie shortly after load
  setTimeout(openNewCookie, 600);
  resetCountdown();
</script>
</body>
</html>
