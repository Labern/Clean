<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Fortune Cookies for Sol</title>
<style>
  :root {
    --r: #ff595e; --o: #ff924c; --y: #ffca3a;
    --g: #8ac926; --b: #1982c4; --i: #6a4c93; --v: #b15ee3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 5vh 5vw 7vh;
    color: #222;
    background: linear-gradient(
      180deg,
      var(--r) 0%, var(--o) 16%, var(--y) 33%, var(--g) 50%,
      var(--b) 67%, var(--i) 84%, var(--v) 100%
    );
    background-attachment: fixed;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(2.2rem, 8vw, 5rem);
    line-height: 1.1;
    color: #fff;
    font-weight: 900;
    text-shadow: 3px 3px 0 #6a4c93, -2px -2px 0 #ff595e, 0 0 18px rgba(0,0,0,0.25);
    margin-bottom: 0.6rem;
    max-width: 14ch;
  }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(0.6rem, 3vw, 1.2rem);
    width: 100%;
    max-width: 820px;
  }

  /* ---- Fortune cookie + fortune slip ---- */
  .cookie-area {
    position: relative;
    width: min(92vw, 360px);
    height: clamp(280px, 46vh, 360px);
  }

  /* The paper fortune that rises out of the cookie */
  .slip {
    position: absolute;
    left: 50%;
    bottom: 56px;
    width: min(82vw, 330px);
    transform: translateX(-50%) translateY(40px) scale(0.25);
    transform-origin: bottom center;
    opacity: 0;
    background: #fffdf5;
    border: 3px solid #e7dcc0;
    border-radius: 14px;
    padding: clamp(1rem, 4.5vw, 1.7rem);
    box-shadow: 0 16px 36px rgba(0,0,0,0.30);
    transition: transform 0.7s cubic-bezier(.2,.9,.25,1.2), opacity 0.5s ease;
    z-index: 1;
  }
  .stage.open .slip {
    transform: translateX(-50%) translateY(-150px) scale(1);
    opacity: 1;
  }
  .fortune {
    font-size: clamp(1.25rem, 5vw, 2.1rem);
    line-height: 1.3;
    font-weight: 700;
    color: #1a1a1a;
  }
  .attrib {
    margin-top: 0.7rem;
    font-size: clamp(0.85rem, 3vw, 1.15rem);
    font-weight: 700;
    color: #b07a1e;
    letter-spacing: 0.3px;
  }

  /* The cookie itself: two halves that crack apart */
  .cookie {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 150px;
    z-index: 2;
    filter: drop-shadow(0 12px 14px rgba(0,0,0,0.30));
  }
  .stage.cracking .cookie { animation: shake 0.45s ease-in-out; }

  .half {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background:
      radial-gradient(120% 90% at 50% 18%, #ffe08a 0%, #f6c453 38%, #e09f3e 70%, #c77f2e 100%);
    transition: transform 0.7s cubic-bezier(.34,1.3,.6,1);
    box-shadow: inset 0 -10px 18px rgba(150,90,20,0.45);
  }
  /* left half: rounded on the left, flat "crack" edge on the right */
  .half.left {
    left: 0;
    border-radius: 130px 16px 16px 130px / 80px 12px 12px 80px;
    border-right: 3px solid rgba(150,90,20,0.5);
    transform-origin: right center;
  }
  .half.right {
    left: 50%;
    border-radius: 16px 130px 130px 16px / 12px 80px 80px 12px;
    border-left: 3px solid rgba(150,90,20,0.5);
    transform-origin: left center;
  }
  /* crease/fold highlight down the middle of each half */
  .half::after {
    content: "";
    position: absolute;
    top: 12%;
    height: 76%;
    width: 14px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    border-radius: 50%;
  }
  .half.left::after  { right: 6px; }
  .half.right::after { left: 6px; }

  .stage.open .half.left  { transform: translateX(-78px) rotate(-26deg); }
  .stage.open .half.right { transform: translateX(78px)  rotate(26deg); }

  @keyframes shake {
    0%,100% { transform: translateX(-50%) rotate(0); }
    20% { transform: translateX(-53%) rotate(-3deg); }
    40% { transform: translateX(-47%) rotate(3deg); }
    60% { transform: translateX(-52%) rotate(-2deg); }
    80% { transform: translateX(-48%) rotate(2deg); }
  }

  /* Sol the lemon */
  .sol {
    width: clamp(150px, 42vw, 260px);
    height: auto;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-12px) rotate(1deg); }
  }

  /* Open button */
  .open-btn {
    font-family: inherit;
    font-weight: 900;
    font-size: clamp(1.1rem, 4.5vw, 1.6rem);
    color: #6a4c93;
    background: #fffdf5;
    border: 4px solid #fff;
    border-radius: 999px;
    padding: 0.7em 1.4em;
    cursor: pointer;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18), 0 12px 24px rgba(0,0,0,0.22);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .open-btn:hover { transform: translateY(-2px); }
  .open-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.18), 0 6px 12px rgba(0,0,0,0.22);
  }
</style>
</head>
<body>
  <h1>Digital Fortune Cookies for Sol</h1>

  <div class="stage" id="stage">
    <div class="cookie-area">
      <div class="slip">
        <div class="fortune" id="fortune">&hellip;</div>
        <div class="attrib">— Marcus Aurelius, <em>Meditations</em></div>
      </div>
      <div class="cookie" aria-hidden="true">
        <div class="half left"></div>
        <div class="half right"></div>
      </div>
    </div>

    <img class="sol" src="sol-lemon.png" alt="Sol the lemon" />

    <button class="open-btn" id="openBtn" type="button">🥠 Open new cookie</button>
  </div>

<script>
  const quotes = [
    "You have power over your mind — not outside events. Realize this, and you will find strength.",
    "The happiness of your life depends upon the quality of your thoughts.",
    "Waste no more time arguing about what a good man should be. Be one.",
    "When you arise in the morning, think of what a precious privilege it is to be alive — to breathe, to think, to enjoy, to love.",
    "The best revenge is to be unlike him who performed the injury.",
    "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.",
    "If it is not right, do not do it; if it is not true, do not say it.",
    "Dwell on the beauty of life. Watch the stars, and see yourself running with them.",
    "Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.",
    "Accept the things to which fate binds you, and love the people with whom fate brings you together.",
    "How much more grievous are the consequences of anger than the causes of it.",
    "The soul becomes dyed with the color of its thoughts.",
    "Confine yourself to the present.",
    "Loss is nothing else but change, and change is Nature's delight.",
    "Look well into thyself; there is a source of strength which will always spring up if thou wilt always look.",
    "The object of life is not to be on the side of the majority, but to escape finding oneself in the ranks of the insane.",
    "Do every act of your life as if it were your last.",
    "Our life is what our thoughts make it.",
    "Be tolerant with others and strict with yourself.",
    "Death smiles at us all; all we can do is smile back.",
    "Nowhere can man find a quieter or more untroubled retreat than in his own soul.",
    "He who lives in harmony with himself lives in harmony with the universe.",
    "It is not death that a man should fear, but he should fear never beginning to live."
  ];

  const stage = document.getElementById('stage');
  const fortuneEl = document.getElementById('fortune');
  const btn = document.getElementById('openBtn');

  let order = shuffle([...quotes.keys()]);
  let idx = -1;
  let timer = null;

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function nextQuote() {
    idx++;
    if (idx >= order.length) { order = shuffle([...quotes.keys()]); idx = 0; }
    return quotes[order[idx]];
  }

  function openNewCookie() {
    // 1) close the current cookie (halves rejoin, slip drops back in)
    stage.classList.remove('open');
    // 2) after it has closed, load the new fortune and crack it open
    setTimeout(() => {
      fortuneEl.innerHTML = '&ldquo;' + nextQuote() + '&rdquo;';
      stage.classList.add('cracking');
      setTimeout(() => {
        stage.classList.remove('cracking');
        stage.classList.add('open');
      }, 450);
    }, 450);
  }

  function schedule() {
    clearInterval(timer);
    timer = setInterval(openNewCookie, 10000); // a new cookie every 10s
  }

  btn.addEventListener('click', () => { openNewCookie(); schedule(); });

  // First cookie shortly after load, then auto every 10s
  setTimeout(openNewCookie, 600);
  schedule();
</script>
</body>
</html>
