<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Fortune Cookies for Sol</title>
<style>
  :root {
    --r: #ff595e; --o: #ff924c; --y: #ffca3a;
    --g: #8ac926; --b: #1982c4; --i: #6a4c93; --v: #b15ee3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    padding: 6vh 5vw 8vh;
    color: #222;
    /* Rainbow background */
    background: linear-gradient(
      180deg,
      var(--r) 0%,
      var(--o) 16%,
      var(--y) 33%,
      var(--g) 50%,
      var(--b) 67%,
      var(--i) 84%,
      var(--v) 100%
    );
    background-attachment: fixed;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(2.2rem, 8vw, 5rem);
    line-height: 1.1;
    color: #fff;
    font-weight: 900;
    letter-spacing: 0.5px;
    text-shadow:
      3px 3px 0 #6a4c93,
      -2px -2px 0 #ff595e,
      0 0 18px rgba(0,0,0,0.25);
    margin-bottom: 1.2rem;
    max-width: 14ch;
  }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(1rem, 4vw, 2rem);
    width: 100%;
    max-width: 820px;
  }

  /* Speech bubble */
  .bubble {
    position: relative;
    background: rgba(255,255,255,0.96);
    border: 5px solid #2a2a2a;
    border-radius: 32px;
    padding: clamp(1.4rem, 5vw, 2.6rem);
    width: 100%;
    max-width: 720px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.28);
  }

  .quote {
    font-size: clamp(1.5rem, 5.5vw, 2.7rem);
    line-height: 1.3;
    font-weight: 700;
    color: #1a1a1a;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .quote.fade {
    opacity: 0;
    transform: translateY(10px);
  }

  .attrib {
    margin-top: 1rem;
    font-size: clamp(0.95rem, 3vw, 1.3rem);
    font-weight: 700;
    color: #6a4c93;
    letter-spacing: 0.5px;
  }

  /* Little tail pointing down to Sol */
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 26px solid transparent;
    border-right: 26px solid transparent;
    border-top: 30px solid #2a2a2a;
  }
  .bubble::before {
    content: "";
    position: absolute;
    bottom: -19px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 22px solid rgba(255,255,255,0.96);
    z-index: 1;
  }

  /* Sol the lemon */
  .sol {
    width: clamp(180px, 55vw, 340px);
    height: auto;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
    animation: bob 3s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-14px) rotate(1deg); }
  }
</style>
</head>
<body>
  <h1>Digital Fortune Cookies for Sol</h1>

  <div class="stage">
    <div class="bubble">
      <div class="quote" id="quote">&ldquo;&hellip;&rdquo;</div>
      <div class="attrib">— Marcus Aurelius, <em>Meditations</em></div>
    </div>
    <img class="sol" src="sol-lemon.png" alt="Sol the lemon" />
  </div>

<script>
  const quotes = [
    "You have power over your mind — not outside events. Realize this, and you will find strength.",
    "The happiness of your life depends upon the quality of your thoughts.",
    "Waste no more time arguing about what a good man should be. Be one.",
    "When you arise in the morning, think of what a precious privilege it is to be alive — to breathe, to think, to enjoy, to love.",
    "The best revenge is to be unlike him who performed the injury.",
    "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.",
    "If it is not right, do not do it; if it is not true, do not say it.",
    "Dwell on the beauty of life. Watch the stars, and see yourself running with them.",
    "Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.",
    "Accept the things to which fate binds you, and love the people with whom fate brings you together.",
    "How much more grievous are the consequences of anger than the causes of it.",
    "The soul becomes dyed with the color of its thoughts.",
    "Confine yourself to the present.",
    "Loss is nothing else but change, and change is Nature's delight.",
    "Look well into thyself; there is a source of strength which will always spring up if thou wilt always look.",
    "The object of life is not to be on the side of the majority, but to escape finding oneself in the ranks of the insane.",
    "Do every act of your life as if it were your last.",
    "Our life is what our thoughts make it.",
    "Be tolerant with others and strict with yourself.",
    "Death smiles at us all; all we can do is smile back.",
    "The universe is change; our life is what our thoughts make it.",
    "Nowhere can man find a quieter or more untroubled retreat than in his own soul.",
    "He who lives in harmony with himself lives in harmony with the universe.",
    "It is not death that a man should fear, but he should fear never beginning to live."
  ];

  const el = document.getElementById('quote');
  let order = shuffle([...quotes.keys()]);
  let idx = 0;

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function show(text) {
    el.classList.add('fade');
    setTimeout(() => {
      el.innerHTML = '&ldquo;' + text + '&rdquo;';
      el.classList.remove('fade');
    }, 600);
  }

  // First quote immediately
  el.innerHTML = '&ldquo;' + quotes[order[idx]] + '&rdquo;';

  setInterval(() => {
    idx = (idx + 1) % order.length;
    if (idx === 0) order = shuffle([...quotes.keys()]); // reshuffle each full pass
    show(quotes[order[idx]]);
  }, 5000);
</script>
</body>
</html>
