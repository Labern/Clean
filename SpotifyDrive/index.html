<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Drive">
  <title>Drive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      /* Aurora gradient stops — driven by album art, fall back to Spotify dark */
      --aur1: #1e3a34;
      --aur2: #0f1d2b;
      --aur3: #2a1438;
      --aur4: #060809;
      --glass:      rgba(255,255,255,0.10);
      --glass-soft: rgba(255,255,255,0.06);
      --glass-line: rgba(255,255,255,0.16);
      --green:  #1DB954;
      --green2: #1ed760;
      --text:   #FFFFFF;
      --muted:  rgba(255,255,255,0.66);
      --pink:   #f472b6;
    }

    html, body {
      height: 100%; color: var(--text);
      font-family: -apple-system, 'Inter', sans-serif;
      overflow: hidden; user-select: none;
      background: #060809;
    }

    /* ── Aurora background ─────────────────────────────────────
       Two layered drifting gradients tinted by album-art colours. */
    #aurora-bg {
      position: fixed; inset: -20%; z-index: -2;
      background:
        radial-gradient(60% 55% at 22% 28%, var(--aur1) 0%, transparent 62%),
        radial-gradient(58% 60% at 80% 22%, var(--aur3) 0%, transparent 60%),
        radial-gradient(70% 65% at 70% 82%, var(--aur2) 0%, transparent 66%),
        radial-gradient(80% 80% at 30% 75%, var(--aur4) 0%, transparent 70%),
        linear-gradient(160deg, var(--aur2), var(--aur4));
      filter: saturate(1.15);
      animation: drift 26s ease-in-out infinite alternate;
      transition: background 1.4s ease;
      will-change: transform;
    }
    #aurora-veil {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(120% 90% at 50% 0%, transparent 40%, rgba(0,0,0,0.35) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.42) 100%);
    }
    @keyframes drift {
      0%   { transform: translate3d(-2%, -1%, 0) scale(1.04) rotate(0deg); }
      50%  { transform: translate3d(2%, 1.5%, 0) scale(1.10) rotate(1.2deg); }
      100% { transform: translate3d(-1.5%, 2%, 0) scale(1.05) rotate(-1deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      #aurora-bg { animation: none; }
    }

    #app {
      height: 100dvh; display: flex; flex-direction: column;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      position: relative; z-index: 1;
    }

    svg { display: block; }

    /* ── Auth ──────────────────────────────────────────────── */
    #auth-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 24px; padding: 40px;
    }
    #auth-screen h1 {
      font-size: 3.4rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(120deg, #fff, var(--green2) 60%, #7ef0c0);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 8px 40px rgba(30,215,96,0.25);
    }
    #auth-screen p { text-align: center; color: var(--muted); font-size: 1.1rem; line-height: 1.6; }

    .btn-connect {
      background: linear-gradient(135deg, var(--green2), var(--green));
      color: #062b14; border: none; border-radius: 22px;
      padding: 22px 52px; font-size: 1.2rem; font-weight: 800;
      cursor: pointer; width: 100%; max-width: 320px;
      letter-spacing: 0.02em; margin-top: 8px;
      box-shadow: 0 14px 44px rgba(30,215,96,0.4);
    }
    .btn-connect:active { transform: scale(0.97); opacity: 0.92; }

    #setup-note {
      font-size: 0.78rem; color: var(--muted); text-align: center;
      max-width: 280px; line-height: 1.5;
    }
    #setup-note code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: #fff; background: rgba(255,255,255,0.1);
      padding: 1px 5px; border-radius: 5px;
    }

    /* Frosted surface mixin look */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border: 1px solid var(--glass-line);
    }

    /* ── Header ────────────────────────────────────────────── */
    #header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; flex-shrink: 0;
    }
    #device-pill {
      flex: 1; display: flex; align-items: center; gap: 10px;
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border: 1px solid var(--glass-line);
      border-radius: 16px; padding: 11px 15px; cursor: pointer;
      font-size: 0.92rem; color: #fff; min-width: 0;
      box-shadow: 0 6px 22px rgba(0,0,0,0.25);
    }
    #device-pill #device-icon { display: flex; flex-shrink: 0; color: var(--green2); }
    #device-pill #device-icon svg { width: 20px; height: 20px; }
    #device-pill .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-weight: 600; }
    #device-pill .caret { color: var(--muted); flex-shrink: 0; font-size: 0.8rem; }
    #logout-btn {
      background: var(--glass); border: 1px solid var(--glass-line);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      color: var(--muted); padding: 10px; cursor: pointer; flex-shrink: 0;
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
    }
    #logout-btn svg { width: 20px; height: 20px; }
    #logout-btn:active { opacity: 0.7; }

    /* ── Now Playing ───────────────────────────────────────── */
    #now-playing {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 12px 24px; gap: 14px; text-align: center; min-height: 0;
    }
    #album-art {
      width: min(220px, 46vw); height: min(220px, 46vw);
      border-radius: 22px; object-fit: cover;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 26px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #album-art.hidden { display: none; }
    #track-name {
      font-size: clamp(1.3rem, 6.4vw, 2.3rem); font-weight: 800;
      line-height: 1.15; max-width: 360px; letter-spacing: -0.02em;
      text-shadow: 0 2px 18px rgba(0,0,0,0.55);
    }
    #artist-name {
      font-size: clamp(1rem, 4vw, 1.25rem); color: var(--muted);
      font-weight: 600; text-shadow: 0 1px 10px rgba(0,0,0,0.5);
    }
    #progress-wrap {
      width: 100%; max-width: 380px; height: 6px;
      background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden;
      margin-top: 2px;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #fff, var(--green2));
      border-radius: 3px; transition: width 1s linear;
      box-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    /* ── Big Controls ──────────────────────────────────────── */
    #controls {
      display: flex; align-items: center; justify-content: center;
      gap: 18px; padding: 8px 20px 14px; flex-shrink: 0;
    }
    .ctrl {
      border-radius: 50%;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--glass-line);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.12s, background 0.2s;
      flex-shrink: 0; box-shadow: 0 10px 32px rgba(0,0,0,0.35);
    }
    .ctrl:active { transform: scale(0.9); }
    .ctrl.skip { width: 92px; height: 92px; }
    .ctrl.skip svg { width: 40px; height: 40px; }
    .ctrl.play {
      width: 116px; height: 116px;
      background: linear-gradient(135deg, var(--green2), var(--green));
      color: #052910; border: none;
      box-shadow: 0 16px 46px rgba(30,215,96,0.5);
    }
    .ctrl.play svg { width: 54px; height: 54px; }
    .ctrl.play:active { transform: scale(0.9); opacity: 0.92; }

    /* ── Secondary Controls ────────────────────────────────── */
    #secondary {
      display: flex; gap: 12px; padding: 0 16px 12px; flex-shrink: 0;
    }
    .sec {
      flex: 1;
      background: var(--glass-soft);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid var(--glass-line);
      border-radius: 18px; color: var(--muted); padding: 14px 6px;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .sec .icon { display: flex; }
    .sec .icon svg { width: 24px; height: 24px; }
    .sec.on, .sec.liked {
      color: var(--green2); border-color: rgba(30,215,96,0.55);
      background: rgba(30,215,96,0.12);
    }
    .sec:active { opacity: 0.7; }

    /* ── Search Bar ────────────────────────────────────────── */
    #search-bar {
      display: flex; gap: 12px; padding: 0 16px 18px; flex-shrink: 0;
    }
    #search-input {
      flex: 1;
      background: var(--glass-soft);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid var(--glass-line);
      border-radius: 18px; color: var(--text); font-size: 1.05rem;
      padding: 16px 20px; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: var(--green2); }
    #search-go {
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid var(--glass-line);
      border-radius: 18px; color: var(--green2); padding: 14px 18px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #search-go svg { width: 24px; height: 24px; }
    #search-go:active { opacity: 0.7; }

    /* ── No-device Banner ──────────────────────────────────── */
    #no-device {
      margin: 0 16px 10px; padding: 12px 14px;
      background: var(--glass-soft); border: 1px solid var(--glass-line);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-radius: 14px; color: var(--muted); font-size: 0.85rem;
      text-align: center; flex-shrink: 0;
    }

    /* ── Device Sheet ──────────────────────────────────────── */
    #device-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; z-index: 200;
    }
    #device-sheet {
      background: rgba(20,22,26,0.72);
      backdrop-filter: blur(34px) saturate(1.5);
      -webkit-backdrop-filter: blur(34px) saturate(1.5);
      border-top: 1px solid var(--glass-line);
      border-radius: 26px 26px 0 0;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
      width: 100%; max-height: 65vh; overflow-y: auto;
    }
    .sheet-title { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 14px; }
    .device-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 12px; border-radius: 16px; cursor: pointer;
      border: 1px solid transparent; margin-bottom: 8px;
    }
    .device-row:active, .device-row.current {
      background: rgba(30,215,96,0.12); border-color: rgba(30,215,96,0.5);
    }
    .device-icon { display: flex; color: #fff; }
    .device-icon svg { width: 26px; height: 26px; }
    .device-name { font-size: 1rem; font-weight: 700; }
    .device-type { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
    .device-check { margin-left: auto; color: var(--green2); display: flex; }
    .device-check svg { width: 22px; height: 22px; }

    /* ── Search Results Overlay ────────────────────────────── */
    #results-overlay {
      position: fixed; inset: 0;
      background: rgba(8,10,12,0.82);
      backdrop-filter: blur(28px) saturate(1.3);
      -webkit-backdrop-filter: blur(28px) saturate(1.3);
      z-index: 100;
      display: flex; flex-direction: column;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px
               calc(env(safe-area-inset-bottom, 0px) + 16px);
      gap: 10px; overflow-y: auto;
    }
    .back-btn {
      background: none; border: none; color: var(--green2);
      font-size: 1rem; font-weight: 700; padding: 6px 0 10px; cursor: pointer;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .back-btn svg { width: 20px; height: 20px; }
    .result-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px;
      background: var(--glass-soft); border: 1px solid var(--glass-line);
      border-radius: 16px; cursor: pointer;
      flex-shrink: 0;
    }
    .result-row:active { opacity: 0.75; }
    .result-row img { width: 54px; height: 54px; border-radius: 10px; flex-shrink: 0; object-fit: cover; }
    .result-track { font-size: 0.95rem; font-weight: 700; }
    .result-artist { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    .hidden { display: none !important; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="aurora-bg"></div>
<div id="aurora-veil"></div>
<div id="app">

  <!-- ── Auth Screen ────────────────────────────────────────── -->
  <div id="auth-screen">
    <h1>Drive</h1>
    <p>Spotify remote built for driving.<br>Big buttons. No faff.</p>
    <button class="btn-connect" onclick="authorize()">Connect Spotify</button>
    <p id="setup-note">
      Requires a free Spotify Developer app.<br>
      Set <code>CLIENT_ID</code> at the top of this file.
    </p>
  </div>

  <!-- ── Main UI ────────────────────────────────────────────── -->
  <div id="main" class="hidden">

    <div id="header">
      <div id="device-pill" onclick="openDevices()">
        <span id="device-icon"></span>
        <span id="device-label" class="label">Select device</span>
        <span class="caret">▾</span>
      </div>
      <button id="logout-btn" onclick="logout()" title="Disconnect" aria-label="Disconnect"></button>
    </div>

    <div id="no-device" class="hidden">
      Open Spotify on any device first, then select it above ↑
    </div>

    <div id="now-playing">
      <img id="album-art" class="hidden" src="" alt="">
      <div id="track-name">Nothing playing</div>
      <div id="artist-name">—</div>
      <div id="progress-wrap"><div id="progress-fill"></div></div>
    </div>

    <div id="controls">
      <button class="ctrl skip" onclick="prev()" aria-label="Previous"></button>
      <button class="ctrl play" id="play-btn" onclick="togglePlay()" aria-label="Play/Pause"></button>
      <button class="ctrl skip" onclick="next()" aria-label="Next"></button>
    </div>

    <div id="secondary">
      <button class="sec" id="shuffle-btn" onclick="toggleShuffle()">
        <span class="icon"></span><span>Shuffle</span>
      </button>
      <button class="sec" id="like-btn" onclick="toggleLike()">
        <span class="icon"></span><span>Like</span>
      </button>
      <button class="sec" id="jam-btn" onclick="jamTap()">
        <span class="icon"></span><span>Jam</span>
      </button>
    </div>

    <div id="search-bar">
      <input id="search-input" type="search" placeholder="Search songs, artists…"
             enterkeyhint="search" autocomplete="off"
             onkeydown="if(event.key==='Enter'){event.preventDefault();doSearch();}">
      <button id="search-go" onclick="doSearch()" aria-label="Search"></button>
    </div>

  </div><!-- /main -->

  <!-- ── Device Sheet ───────────────────────────────────────── -->
  <div id="device-overlay" class="hidden" onclick="closeDevicesOnBg(event)">
    <div id="device-sheet">
      <div class="sheet-title">Choose a device</div>
      <div id="device-list"></div>
    </div>
  </div>

  <!-- ── Search Results Overlay ─────────────────────────────── -->
  <div id="results-overlay" class="hidden">
    <button class="back-btn" onclick="closeSearch()"></button>
    <div id="results-list"></div>
  </div>

</div><!-- /app -->

<script>
// ── CONFIG — fill this in before using ──────────────────────────────
const CLIENT_ID = '8a2fa6f88fac444290f3d0c81e390346';
// Get one free at: https://developer.spotify.com/dashboard
// Redirect URI to register: https://labern.github.io/Clean/SpotifyDrive/index.html
// ────────────────────────────────────────────────────────────────────

const REDIRECT_URI = 'https://labern.github.io/Clean/SpotifyDrive/index.html';
const SCOPES = [
  'user-read-playback-state',
  'user-modify-playback-state',
  'user-read-currently-playing',
  'user-library-read',
  'user-library-modify',
].join(' ');

// ── SVG icon set ─────────────────────────────────────────────────────
const ICON = {
  play:    '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>',
  pause:   '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>',
  prev:    '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>',
  next:    '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>',
  shuffle: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>',
  heart:       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><path d="M12 20.5 4.2 12.7a4.6 4.6 0 0 1 6.5-6.5l1.3 1.3 1.3-1.3a4.6 4.6 0 0 1 6.5 6.5L12 20.5z"/></svg>',
  heartFilled: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 20.5 4.2 12.7a4.6 4.6 0 0 1 6.5-6.5l1.3 1.3 1.3-1.3a4.6 4.6 0 0 1 6.5 6.5L12 20.5z"/></svg>',
  people:  '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 11a3 3 0 1 0-3-3 3 3 0 0 0 3 3zm-8 0a3 3 0 1 0-3-3 3 3 0 0 0 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05A4.4 4.4 0 0 1 17 16.5V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>',
  search:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  power:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 3v9"/><path d="M6.6 6.6a8 8 0 1 0 10.8 0"/></svg>',
  check:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12l5 5 9-10"/></svg>',
  back:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>',
  device: {
    phone:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>',
    computer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="1"/><path d="M8 20h8M12 16v4"/></svg>',
    speaker:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="14" r="3.5"/><circle cx="12" cy="6" r="1"/></svg>',
    car:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><path d="M3 13l2-5a2 2 0 0 1 1.9-1.4h10.2A2 2 0 0 1 21 8l2 5v5h-3v-2H6v2H3z"/><circle cx="7.5" cy="15.5" r="1.5"/><circle cx="16.5" cy="15.5" r="1.5"/></svg>',
    tv:       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="5" width="18" height="12" rx="1"/><path d="M8 21h8"/></svg>',
  },
};
function deviceSvg(t) {
  const map = {
    Computer: 'computer', Smartphone: 'phone', Speaker: 'speaker',
    CastVideo: 'tv', TV: 'tv', CarThing: 'car', Automobile: 'car',
  };
  return ICON.device[map[t] || 'speaker'];
}

// ── PKCE ─────────────────────────────────────────────────────────────
function rndStr(n) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const bytes = crypto.getRandomValues(new Uint8Array(n));
  return Array.from(bytes, b => chars[b % chars.length]).join('');
}
async function codeChallenge(v) {
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
async function authorize() {
  if (CLIENT_ID === 'YOUR_CLIENT_ID_HERE') {
    alert('Set CLIENT_ID in this file first.\nSee the comment at the top of the <script> block.');
    return;
  }
  const v = rndStr(128);
  sessionStorage.setItem('pkce_v', v);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code',
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256', code_challenge: await codeChallenge(v),
    scope: SCOPES,
  });
  location.href = 'https://accounts.spotify.com/authorize?' + params;
}
async function exchangeCode(code) {
  const v = sessionStorage.getItem('pkce_v');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code', code,
      redirect_uri: REDIRECT_URI, client_id: CLIENT_ID, code_verifier: v,
    }),
  });
  storeTokens(await res.json());
}
async function refreshAccessToken() {
  const rt = ls('refresh_token');
  if (!rt) { showAuth(); return null; }
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token', refresh_token: rt, client_id: CLIENT_ID,
    }),
  });
  const d = await res.json();
  storeTokens(d);
  return d.access_token;
}
function storeTokens(d) {
  if (!d.access_token) return;
  lsSet('access_token', d.access_token);
  lsSet('token_expiry', Date.now() + d.expires_in * 1000);
  if (d.refresh_token) lsSet('refresh_token', d.refresh_token);
}
async function getToken() {
  const expiry = +ls('token_expiry') || 0;
  if (Date.now() > expiry - 60_000) return refreshAccessToken();
  return ls('access_token');
}

// ── localStorage helpers ──────────────────────────────────────────
const ls    = k => localStorage.getItem(k);
const lsSet = (k, v) => localStorage.setItem(k, v);

// ── API ───────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const t = await getToken();
  const opts = { method, headers: { Authorization: 'Bearer ' + t } };
  if (body !== null) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch('https://api.spotify.com/v1' + path, opts);
  if (res.status === 204 || res.status === 202) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw Object.assign(new Error(err?.error?.message || res.status), { status: res.status });
  }
  return res.json();
}

// ── State ─────────────────────────────────────────────────────────
const S = {
  playing: false, shuffle: false, liked: false,
  trackId: null, deviceId: null,
  progressMs: 0, durationMs: 0,
};
let pollTimer = null, tickTimer = null;

// ── Playback ──────────────────────────────────────────────────────
function devQ() { return S.deviceId ? `?device_id=${S.deviceId}` : ''; }

async function togglePlay() {
  try {
    await api(S.playing ? '/me/player/pause' : '/me/player/play' + devQ(), 'PUT');
    S.playing = !S.playing;
    renderPlayBtn();
  } catch(e) { console.warn('togglePlay', e); }
}
async function next() {
  await api('/me/player/next' + devQ(), 'POST').catch(console.warn);
  setTimeout(fetchState, 600);
}
async function prev() {
  await api('/me/player/previous' + devQ(), 'POST').catch(console.warn);
  setTimeout(fetchState, 600);
}
async function toggleShuffle() {
  S.shuffle = !S.shuffle;
  const q = `?state=${S.shuffle}` + (S.deviceId ? `&device_id=${S.deviceId}` : '');
  await api('/me/player/shuffle' + q, 'PUT').catch(console.warn);
  renderShuffleBtn();
}
async function toggleLike() {
  if (!S.trackId) return;
  S.liked = !S.liked;
  renderLikeBtn();
  const method = S.liked ? 'PUT' : 'DELETE';
  await api(`/me/tracks?ids=${S.trackId}`, method).catch(() => {
    S.liked = !S.liked; renderLikeBtn(); // revert on error
  });
}

// ── Render helpers ────────────────────────────────────────────────
function renderPlayBtn() {
  $('play-btn').innerHTML = S.playing ? ICON.pause : ICON.play;
}
function renderShuffleBtn() {
  $('shuffle-btn').classList.toggle('on', S.shuffle);
}
function renderLikeBtn() {
  const btn = $('like-btn');
  btn.querySelector('.icon').innerHTML = S.liked ? ICON.heartFilled : ICON.heart;
  btn.classList.toggle('liked', S.liked);
}
// One-time icon injection for static buttons
function renderStaticIcons() {
  const setIcon = (sel, svg) => { const el = $(sel); if (el) el.querySelector('.icon').innerHTML = svg; };
  $('device-icon').innerHTML = deviceSvg('Smartphone');
  $('logout-btn').innerHTML = ICON.power;
  $('search-go').innerHTML = ICON.search;
  document.querySelector('#controls .skip[onclick="prev()"]').innerHTML = ICON.prev;
  document.querySelector('#controls .skip[onclick="next()"]').innerHTML = ICON.next;
  setIcon('shuffle-btn', ICON.shuffle);
  setIcon('jam-btn', ICON.people);
  renderPlayBtn();
  renderLikeBtn();
  const back = document.querySelector('#results-overlay .back-btn');
  if (back) back.innerHTML = ICON.back + '<span>Back</span>';
}

// ── Aurora background colour sampling ─────────────────────────────
// Draw album art to a tiny offscreen canvas, average a few regions,
// and feed them into the CSS gradient variables. Must never throw in
// a way that breaks playback — everything is wrapped/guarded.
const _aurCanvas = document.createElement('canvas');
_aurCanvas.width = 16; _aurCanvas.height = 16;
let _aurLastUrl = null;

function applyAuroraColors(url) {
  try {
    if (!url || url === _aurLastUrl) return;
    _aurLastUrl = url;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const ctx = _aurCanvas.getContext('2d', { willReadFrequently: true });
        if (!ctx) return;
        ctx.drawImage(img, 0, 0, 16, 16);
        let data;
        try { data = ctx.getImageData(0, 0, 16, 16).data; }
        catch (e) { return; } // tainted canvas (CORS) — keep current/default gradient
        // Sample four quadrants for representative tints.
        const quad = (x0, y0, x1, y1) => {
          let r = 0, g = 0, b = 0, n = 0;
          for (let y = y0; y < y1; y++) for (let x = x0; x < x1; x++) {
            const i = (y * 16 + x) * 4;
            r += data[i]; g += data[i + 1]; b += data[i + 2]; n++;
          }
          return n ? [r / n, g / n, b / n] : [20, 24, 28];
        };
        const tl = quad(0, 0, 8, 8), tr = quad(8, 0, 16, 8);
        const bl = quad(0, 8, 8, 16), br = quad(8, 8, 16, 16);
        // Boost vividness a touch, then darken slightly so white text reads.
        const css = (c, mul) => {
          const f = v => Math.max(0, Math.min(255, Math.round(v * mul)));
          return `rgb(${f(c[0])},${f(c[1])},${f(c[2])})`;
        };
        const root = document.documentElement.style;
        root.setProperty('--aur1', css(tl, 0.92));
        root.setProperty('--aur3', css(tr, 0.86));
        root.setProperty('--aur2', css(bl, 0.55));
        root.setProperty('--aur4', css(br, 0.32));
      } catch (e) { /* never break playback */ }
    };
    img.onerror = () => {};
    img.src = url;
  } catch (e) { /* never break playback */ }
}

// ── Fetch Playback State ──────────────────────────────────────────
async function fetchState() {
  try {
    const d = await api('/me/player');
    if (!d || !d.item) {
      $('track-name').textContent = 'Nothing playing';
      $('artist-name').textContent = '—';
      $('album-art').classList.add('hidden');
      $('no-device').classList.remove('hidden');
      return;
    }
    $('no-device').classList.add('hidden');

    const t = d.item;
    const newTrack = t.id !== S.trackId;

    S.playing     = d.is_playing;
    S.shuffle     = d.shuffle_state;
    S.progressMs  = d.progress_ms;
    S.durationMs  = t.duration_ms;
    if (d.device) S.deviceId = d.device.id;

    $('track-name').textContent  = t.name;
    $('artist-name').textContent = t.artists.map(a => a.name).join(', ');

    const art = t.album?.images?.[0]?.url;
    if (art) {
      $('album-art').src = art; $('album-art').classList.remove('hidden');
      applyAuroraColors(art); // drive the drifting background from the artwork
    }
    else      { $('album-art').classList.add('hidden'); }

    if (d.device) {
      $('device-label').textContent = d.device.name;
      $('device-icon').innerHTML    = deviceSvg(d.device.type);
    }

    renderPlayBtn();
    renderShuffleBtn();
    renderProgress();

    if (newTrack) { S.trackId = t.id; checkLiked(); }
  } catch(e) { console.warn('fetchState', e); }
}

function renderProgress() {
  if (!S.durationMs) return;
  $('progress-fill').style.width = (S.progressMs / S.durationMs * 100) + '%';
}
function tickProgress() {
  if (!S.playing || !S.durationMs) return;
  S.progressMs = Math.min(S.progressMs + 1000, S.durationMs);
  $('progress-fill').style.transition = 'width 1s linear';
  renderProgress();
}
async function checkLiked() {
  if (!S.trackId) return;
  try {
    const d = await api(`/me/tracks/contains?ids=${S.trackId}`);
    S.liked = Array.isArray(d) ? d[0] : false;
    renderLikeBtn();
  } catch(e) {}
}

function startPolling() {
  clearInterval(pollTimer); clearInterval(tickTimer);
  fetchState();
  pollTimer = setInterval(fetchState, 5000);
  tickTimer = setInterval(tickProgress, 1000);
}

// ── Devices ───────────────────────────────────────────────────────
async function openDevices() {
  show('device-overlay');
  const list = $('device-list');
  list.innerHTML = '<div style="color:var(--muted);padding:14px 0">Loading…</div>';
  try {
    const d = await api('/me/player/devices');
    const devs = d?.devices || [];
    if (!devs.length) {
      list.innerHTML = '<div style="color:var(--muted);padding:14px 0">No active Spotify devices found.<br>Open Spotify somewhere first.</div>';
      return;
    }
    list.innerHTML = devs.map(dev => `
      <div class="device-row ${dev.id === S.deviceId ? 'current' : ''}"
           onclick="pickDevice('${esc(dev.id)}','${esc(dev.name)}','${esc(dev.type)}')">
        <span class="device-icon">${deviceSvg(dev.type)}</span>
        <div>
          <div class="device-name">${esc(dev.name)}</div>
          <div class="device-type">${dev.type}${dev.is_active ? ' · active' : ''}</div>
        </div>
        ${dev.id === S.deviceId ? '<span class="device-check">' + ICON.check + '</span>' : ''}
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<div style="color:var(--pink);padding:14px 0">Couldn\'t load devices.</div>';
  }
}
function pickDevice(id, name, type) {
  S.deviceId = id;
  $('device-label').textContent = name;
  $('device-icon').innerHTML    = deviceSvg(type);
  hide('device-overlay');
  $('no-device').classList.add('hidden');
  api('/me/player', 'PUT', { device_ids: [id], play: S.playing }).catch(() => {});
}
function closeDevicesOnBg(e) { if (e.target.id === 'device-overlay') hide('device-overlay'); }

// ── Search ────────────────────────────────────────────────────────
async function doSearch() {
  const q = $('search-input').value.trim();
  if (!q) return;
  $('search-input').blur();
  show('results-overlay');
  const list = $('results-list');
  list.innerHTML = '<div style="color:var(--muted);padding:20px 0">Searching…</div>';
  try {
    const d = await api(`/search?q=${encodeURIComponent(q)}&type=track&limit=25`);
    const tracks = d?.tracks?.items || [];
    if (!tracks.length) {
      list.innerHTML = '<div style="color:var(--muted);padding:20px 0">No results.</div>';
      return;
    }
    list.innerHTML = tracks.map(t => `
      <div class="result-row" onclick="playTrackUri('${esc(t.uri)}')">
        <img src="${t.album?.images?.[2]?.url || ''}" alt=""
             onerror="this.style.display='none'" loading="lazy">
        <div>
          <div class="result-track">${esc(t.name)}</div>
          <div class="result-artist">${esc(t.artists.map(a => a.name).join(', '))}</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = `<div style="color:var(--pink);padding:20px 0">Search error: ${e.message}</div>`;
  }
}
async function playTrackUri(uri) {
  closeSearch();
  try {
    await api('/me/player/play' + devQ(), 'PUT', { uris: [uri] });
    setTimeout(fetchState, 800);
  } catch(e) { console.warn('playTrack', e); }
}
function closeSearch() {
  hide('results-overlay');
  $('search-input').value = '';
}

// ── Jam ───────────────────────────────────────────────────────────
function jamTap() {
  // Spotify doesn't expose Jam creation via API. Best we can do: deep-link to app.
  if (confirm('Jam needs to be started inside Spotify.\n\nOpen Spotify now?')) {
    location.href = 'spotify://';
  }
}

// ── Auth flow ─────────────────────────────────────────────────────
function logout() {
  clearInterval(pollTimer); clearInterval(tickTimer);
  localStorage.clear();
  hide('main'); show('auth-screen');
}
function showAuth() { hide('main'); show('auth-screen'); }
function showMain() { hide('auth-screen'); show('main'); renderStaticIcons(); startPolling(); }

// ── Tiny helpers ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const show = id => $( id).classList.remove('hidden');
const hide = id => $( id).classList.add('hidden');
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Init ──────────────────────────────────────────────────────────
(async () => {
  const params = new URLSearchParams(location.search);
  const code   = params.get('code');
  if (code) {
    history.replaceState({}, '', location.pathname);
    await exchangeCode(code);
  }
  if (ls('access_token')) showMain(); else showAuth();
})();
</script>
